version: "3.9"

services:
  trading-bot:
    build: .
    container_name: delta-trading-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DELTA_MODE: paper
      DELTA_ENABLE_ASYNC_RUNNER: "true"
      DELTA_METRICS_PORT: 8000
      DELTA_METRICS_ADDR: 0.0.0.0
      DELTA_REDIS_URL: redis://redis:6379/0
      DELTA_POSTGRES_DSN: postgresql://postgres:postgres@postgres:5432/trading
    volumes:
      - .:/app
    depends_on:
      - redis
      - postgres
    ports:
      - "8000:8000"
    command: ["python", "scripts/run_bot.py", "--mode", "paper", "--strategy", "portfolio"]

  redis:
    image: redis:7-alpine
    container_name: delta-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    container_name: delta-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trading
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  prometheus:
    image: prom/prometheus:latest
    container_name: delta-prometheus
    restart: unless-stopped
    depends_on:
      - trading-bot
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"

volumes:
  postgres_data:
  prometheus_data:
